openapi: 3.0.3
info:
  title: LoraMap API
  version: 1.1.0
  description: |
    API documentation for LoraMap.

    Most endpoints require an authenticated Flask session cookie.
    The `/api/access/last_messages` endpoint uses a user-generated access token instead.
servers:
  - url: /
security:
  - cookieAuth: []
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
    bearerAccessToken:
      type: http
      scheme: bearer
      bearerFormat: opaque
  parameters:
    DevicesParam:
      name: devices
      in: query
      required: false
      schema:
        type: string
      description: Comma-separated list of device IDs.
    FromParam:
      name: from
      in: query
      required: false
      schema:
        type: string
        format: date-time
      description: Lower bound for `real_timestamp`.
    ToParam:
      name: to
      in: query
      required: false
      schema:
        type: string
        format: date-time
      description: Upper bound for `real_timestamp`.
    BatteryMinParam:
      name: battery_min
      in: query
      required: false
      schema:
        type: number
    BatteryMaxParam:
      name: battery_max
      in: query
      required: false
      schema:
        type: number
    BatteryVoltageMinParam:
      name: battery_voltage_min
      in: query
      required: false
      schema:
        type: number
    BatteryVoltageMaxParam:
      name: battery_voltage_max
      in: query
      required: false
      schema:
        type: number
    AirTemperatureMinParam:
      name: air_temperature_min
      in: query
      required: false
      schema:
        type: number
    AirTemperatureMaxParam:
      name: air_temperature_max
      in: query
      required: false
      schema:
        type: number
    ExternalTemperatureMinParam:
      name: external_temperature_min
      in: query
      required: false
      schema:
        type: number
    ExternalTemperatureMaxParam:
      name: external_temperature_max
      in: query
      required: false
      schema:
        type: number
    HumidityMinParam:
      name: humidity_min
      in: query
      required: false
      schema:
        type: number
    HumidityMaxParam:
      name: humidity_max
      in: query
      required: false
      schema:
        type: number
    LightMinParam:
      name: light_min
      in: query
      required: false
      schema:
        type: number
    LightMaxParam:
      name: light_max
      in: query
      required: false
      schema:
        type: number
    MetricParam:
      name: metric
      in: query
      required: false
      schema:
        type: string
        enum:
          - battery
          - battery_voltage
          - air_temperature
          - external_temperature
          - humidity
          - light
          - positioning_status
          - event_status
          - rssi
          - channel_rssi
          - snr
          - channel_index
          - consumed_airtime
        default: battery
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
    Message:
      type: object
      properties:
        id:
          type: integer
        device_id:
          type: string
        received_at:
          type: string
          format: date-time
        real_timestamp:
          type: string
          format: date-time
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        battery:
          type: number
          nullable: true
        battery_voltage:
          type: number
          nullable: true
        air_temperature:
          type: number
          nullable: true
        external_temperature:
          type: number
          nullable: true
        humidity:
          type: number
          nullable: true
        light:
          type: number
          nullable: true
        rssi:
          type: integer
          nullable: true
        channel_rssi:
          type: integer
          nullable: true
        snr:
          type: number
          nullable: true
        channel_index:
          type: integer
          nullable: true
        gateway_count:
          type: integer
          nullable: true
        gateway_id:
          type: string
          nullable: true
        gateway_eui:
          type: string
          nullable: true
        spreading_factor:
          type: integer
          nullable: true
        bandwidth:
          type: integer
          nullable: true
        coding_rate:
          type: string
          nullable: true
        consumed_airtime:
          type: string
          nullable: true
        positioning_status:
          type: string
          nullable: true
        event_status:
          type: string
          nullable: true
        f_cnt:
          type: integer
          nullable: true
    Position:
      allOf:
        - $ref: '#/components/schemas/Message'
        - type: object
          properties:
            latest_air_temperature:
              type: number
              nullable: true
            latest_external_temperature:
              type: number
              nullable: true
            latest_humidity:
              type: number
              nullable: true
            latest_battery_voltage:
              type: number
              nullable: true
            latest_light:
              type: number
              nullable: true
            latest_positioning_status:
              type: string
              nullable: true
            latest_event_status:
              type: string
              nullable: true
    PositionResponse:
      type: object
      properties:
        positions:
          type: array
          items:
            $ref: '#/components/schemas/Position'
        device_ids:
          type: array
          items:
            type: string
    DeviceSummary:
      type: object
      properties:
        device_id:
          type: string
        last_latitude:
          type: number
          nullable: true
        last_longitude:
          type: number
          nullable: true
        last_gps_at:
          type: string
          format: date-time
          nullable: true
        last_gps_received_at:
          type: string
          format: date-time
          nullable: true
        last_battery:
          type: number
          nullable: true
        last_battery_voltage:
          type: number
          nullable: true
        last_air_temperature:
          type: number
          nullable: true
        last_external_temperature:
          type: number
          nullable: true
        last_humidity:
          type: number
          nullable: true
        last_light:
          type: number
          nullable: true
        last_positioning_status:
          type: string
          nullable: true
        last_event_status:
          type: string
          nullable: true
        last_rssi:
          type: integer
          nullable: true
        last_channel_rssi:
          type: integer
          nullable: true
        last_snr:
          type: number
          nullable: true
        last_channel_index:
          type: integer
          nullable: true
        last_gateway_count:
          type: integer
          nullable: true
        last_spreading_factor:
          type: integer
          nullable: true
        last_bandwidth:
          type: integer
          nullable: true
        last_coding_rate:
          type: string
          nullable: true
        last_consumed_airtime:
          type: string
          nullable: true
        last_received_at:
          type: string
          format: date-time
          nullable: true
        last_real_timestamp:
          type: string
          format: date-time
          nullable: true
        seconds_ago:
          type: integer
          nullable: true
        gps_seconds_ago:
          type: integer
          nullable: true
        message_count:
          type: integer
    DevicesResponse:
      type: object
      properties:
        devices:
          type: array
          items:
            $ref: '#/components/schemas/DeviceSummary'
    DeviceColorsResponse:
      type: object
      properties:
        colors:
          type: object
          additionalProperties:
            type: string
            pattern: '^#[0-9A-F]{6}$'
    SetDeviceColorRequest:
      type: object
      required:
        - device_id
        - color
      properties:
        device_id:
          type: string
        color:
          type: string
          pattern: '^#[0-9A-F]{6}$'
    SetDeviceColorResponse:
      type: object
      properties:
        ok:
          type: boolean
        device_id:
          type: string
        color:
          type: string
    DeviceNamesResponse:
      type: object
      properties:
        names:
          type: object
          additionalProperties:
            type: string
    SetDeviceNameRequest:
      type: object
      required:
        - device_id
      properties:
        device_id:
          type: string
        short_name:
          type: string
    SetDeviceNameResponse:
      type: object
      properties:
        ok:
          type: boolean
        device_id:
          type: string
        short_name:
          type: string
    ChartPoint:
      type: object
      properties:
        device_id:
          type: string
        received_at:
          type: string
          format: date-time
        real_timestamp:
          type: string
          format: date-time
        battery:
          type: number
          nullable: true
        battery_voltage:
          type: number
          nullable: true
        air_temperature:
          type: number
          nullable: true
        external_temperature:
          type: number
          nullable: true
        humidity:
          type: number
          nullable: true
        light:
          type: number
          nullable: true
        positioning_status:
          type: string
          nullable: true
        event_status:
          type: string
          nullable: true
        rssi:
          type: integer
          nullable: true
        channel_rssi:
          type: integer
          nullable: true
        snr:
          type: number
          nullable: true
        channel_index:
          type: integer
          nullable: true
        consumed_airtime:
          type: number
          nullable: true
    ChartDataResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ChartPoint'
    MessagesResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
    MessagesRangeResponse:
      type: object
      properties:
        min:
          type: string
          format: date-time
          nullable: true
        max:
          type: string
          format: date-time
          nullable: true
    StatsResponse:
      type: object
      properties:
        total_messages:
          type: integer
        total_devices:
          type: integer
        last_week:
          type: integer
        last_month:
          type: integer
        active_devices:
          type: integer
        last_received_at:
          type: string
          format: date-time
          nullable: true
        last_real_timestamp:
          type: string
          format: date-time
          nullable: true
    FetchAllResponse:
      type: object
      properties:
        inserted:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: string
    AccessLastMessagesResponse:
      type: object
      properties:
        token_name:
          type: string
        devices:
          type: array
          items:
            type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
paths:
  /api/stats:
    get:
      summary: Get global installation stats
      security: []
      responses:
        '200':
          description: Stats payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsResponse'
  /api/positions:
    get:
      summary: Get map/tracker positions
      parameters:
        - $ref: '#/components/parameters/DevicesParam'
        - $ref: '#/components/parameters/FromParam'
        - $ref: '#/components/parameters/ToParam'
        - name: last_only
          in: query
          required: false
          schema:
            type: boolean
          description: Return only the latest position per device.
      responses:
        '200':
          description: Position payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PositionResponse'
        '401':
          description: Unauthorized
  /api/devices:
    get:
      summary: Get per-device summary data for the dashboard
      parameters:
        - $ref: '#/components/parameters/DevicesParam'
        - $ref: '#/components/parameters/FromParam'
        - $ref: '#/components/parameters/ToParam'
      responses:
        '200':
          description: Device summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicesResponse'
        '401':
          description: Unauthorized
  /api/device_colors:
    get:
      summary: Get saved device colors for the current user
      responses:
        '200':
          description: Color map
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceColorsResponse'
        '401':
          description: Unauthorized
    post:
      summary: Save a device color for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetDeviceColorRequest'
      responses:
        '200':
          description: Color saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetDeviceColorResponse'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
  /api/device_names:
    get:
      summary: Get saved device short names for the current user
      responses:
        '200':
          description: Name map
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceNamesResponse'
        '401':
          description: Unauthorized
    post:
      summary: Save a device short name for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetDeviceNameRequest'
      responses:
        '200':
          description: Name saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetDeviceNameResponse'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
  /api/chart_data:
    get:
      summary: Get time-series data for one metric
      parameters:
        - name: device_id
          in: query
          required: false
          schema:
            type: string
          description: Filter to one device.
        - $ref: '#/components/parameters/MetricParam'
        - $ref: '#/components/parameters/FromParam'
        - $ref: '#/components/parameters/ToParam'
        - $ref: '#/components/parameters/BatteryMinParam'
        - $ref: '#/components/parameters/BatteryMaxParam'
        - $ref: '#/components/parameters/BatteryVoltageMinParam'
        - $ref: '#/components/parameters/BatteryVoltageMaxParam'
        - $ref: '#/components/parameters/AirTemperatureMinParam'
        - $ref: '#/components/parameters/AirTemperatureMaxParam'
        - $ref: '#/components/parameters/ExternalTemperatureMinParam'
        - $ref: '#/components/parameters/ExternalTemperatureMaxParam'
        - $ref: '#/components/parameters/HumidityMinParam'
        - $ref: '#/components/parameters/HumidityMaxParam'
        - $ref: '#/components/parameters/LightMinParam'
        - $ref: '#/components/parameters/LightMaxParam'
      responses:
        '200':
          description: Chart data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChartDataResponse'
        '400':
          description: Invalid metric
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
  /api/messages/range:
    get:
      summary: Get min/max message timestamps for current user data
      responses:
        '200':
          description: Range payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagesRangeResponse'
        '401':
          description: Unauthorized
  /api/messages:
    get:
      summary: Get messages for the current user
      parameters:
        - $ref: '#/components/parameters/DevicesParam'
        - $ref: '#/components/parameters/FromParam'
        - $ref: '#/components/parameters/ToParam'
        - $ref: '#/components/parameters/BatteryMinParam'
        - $ref: '#/components/parameters/BatteryMaxParam'
        - $ref: '#/components/parameters/BatteryVoltageMinParam'
        - $ref: '#/components/parameters/BatteryVoltageMaxParam'
        - $ref: '#/components/parameters/AirTemperatureMinParam'
        - $ref: '#/components/parameters/AirTemperatureMaxParam'
        - $ref: '#/components/parameters/ExternalTemperatureMinParam'
        - $ref: '#/components/parameters/ExternalTemperatureMaxParam'
        - $ref: '#/components/parameters/HumidityMinParam'
        - $ref: '#/components/parameters/HumidityMaxParam'
        - $ref: '#/components/parameters/LightMinParam'
        - $ref: '#/components/parameters/LightMaxParam'
      responses:
        '200':
          description: Messages payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagesResponse'
        '401':
          description: Unauthorized
  /api/access/last_messages:
    get:
      summary: Get the latest message for one or more devices using an access token
      security:
        - bearerAccessToken: []
        - {}
      parameters:
        - $ref: '#/components/parameters/DevicesParam'
        - name: token
          in: query
          required: false
          schema:
            type: string
          description: "Alternative to `Authorization: Bearer <token>` or `X-Access-Token`."
      responses:
        '200':
          description: Latest messages for allowed devices. If `devices` is omitted, returns the latest message for every device allowed by the token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessLastMessagesResponse'
        '401':
          description: Missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid token, locked token, or unauthorized device request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/fetch_all:
    post:
      summary: Trigger fetch from all enabled data sources for the current user
      responses:
        '200':
          description: Fetch completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FetchAllResponse'
        '400':
          description: No enabled data sources configured
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - type: object
                    properties:
                      inserted:
                        type: integer
                      skipped:
                        type: integer
        '401':
          description: Unauthorized
